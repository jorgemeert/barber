<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CorteJá</title>
  </head>
  <body>
    <main id="login">
      <div>
        <h1>Corte Já</h1>
        <h2>Seja bem-vindo Barbeiro!!</h2>
      </div>
      <div>
        <button id="trocaLogin">Login</button>
        <button id="trocaRegistro">Registre-se</button>
      </div>
      <div>
        <div>
          <label for="numero_login">Digite seu número</label>
          <input type="text" id="numero_login" />
        </div>
        <div>
          <label for="senha_login">Digite sua senha</label>
          <input type="password" id="senha_login" />
        </div>
        <button id="btnLogin">Entrar</button>
      </div>
    </main>
    <!-- Registro -->
    <section id="registro" style="display: none">
      <div>
        <h1>Corte Já</h1>
        <h2>Registre-se como Barbeiro!</h2>
      </div>
      <div>
        <button id="registroTrocaLogin">Login</button>
        <button id="registroTrocaRegistro">Registre-se</button>
      </div>
      <div>
        <div>
          <label for="nome_registro">Digite seu Nome</label>
          <input type="text" id="nome_registro" />
        </div>
        <div>
          <label for="nome_barbearia">Digite o nome Barbearia</label>
          <input type="text" id="nome_barbearia" />
        </div>
        <div>
          <label for="telefone">Digite seu número</label>
          <input type="text" id="telefone" />
        </div>
        <div>
          <label for="senha_registro">Digite sua senha</label>
          <input type="password" id="senha_registro" />
        </div>
        <div>
          <label for="localizacao">Digite o endereço</label>
          <input type="text" id="localizacao" />
        </div>
        <div>
          <label for="foto">Escolha uma foto para Barbearia</label>
          <input type="file" id="foto" />
        </div>

        <button id="btnRegistrar">Registrar</button>
      </div>
    </section>
    <script src="./JavaScript/login.js"></script>
  </body>
</html>
