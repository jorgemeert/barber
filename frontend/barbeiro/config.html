<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CorteJá</title>
  </head>
  <body>
    <header>
      <h1>CorteJá</h1>
      <h3>Primeiras definições</h3>
    </header>

    <main>
      <section>
        <h2>Quais serviços você irá realizar?</h2>
        <div>
          <ul>
            <div>
              <li>
                <input
                  type="checkbox"
                  class="servicos"
                  id="checkCorte"
                  data-nome="Corte"
                  =""
                />Corte de cabelo
                <input
                  type="text"
                  class="valor"
                  id="valorCorte"
                  placeholder="Digite o valor do serviço"
                />
              </li>
            </div>
            <div>
              <li>
                <input
                  type="checkbox"
                  class="servicos"
                  id="checkSobrancelha"
                  data-nome="Sobrancelha"
                />Sobrancelha
                <input
                  class="valor"
                  type="text"
                  id="valorSobrancelha"
                  placeholder="Digite o valor do serviço"
                />
              </li>
            </div>
            <div>
              <li>
                <input
                  type="checkbox"
                  class="servicos"
                  id="checkBarba"
                  data-nome="Barba"
                />Barba
                <input
                  class="valor"
                  type="text"
                  id="valorBarba"
                  placeholder="Digite o valor do serviço"
                />
              </li>
            </div>
            <div>
              <li>
                <input
                  type="checkbox"
                  class="servicos"
                  id="checkPe"
                  data-nome="Pézinho"
                />Pézinho
                <input
                  class="valor"
                  type="text"
                  id="valorPe"
                  placeholder="Digite o valor do serviço"
                />
              </li>
              <button id="btnConfirma">Confirmar</button>
            </div>
          </ul>
        </div>
      </section>
    </main>
    <script src="./JavaScript/config.js"></script>
  </body>
</html>
