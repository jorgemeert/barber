<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CorteJá</title>
    <link rel="stylesheet" href="./css/config.css" />
  </head>
  <body>
    <header>
      <h1>CorteJá</h1>
      <p>Primeiras definições</p>
    </header>

    <main>
      <h2>Quais serviços você irá realizar?</h2>
      <div class="servicos-container">
        <ul>
          <li>
            <label class="toggle-container">
              <input
                type="checkbox"
                class="servicos"
                id="checkCorte"
                data-nome="Corte"
              />
              <span class="toggle"></span>
              <span class="nome-servico">Corte de cabelo</span>
            </label>
            <input
              type="text"
              class="valor"
              id="valorCorte"
              placeholder="Digite o valor"
            />
          </li>
          <li>
            <label class="toggle-container">
              <input
                type="checkbox"
                class="servicos"
                id="checkSobrancelha"
                data-nome="Sobrancelha"
              />
              <span class="toggle"></span>
              <span class="nome-servico">Sobrancelha</span>
            </label>
            <input
              type="text"
              class="valor"
              id="valorSobrancelha"
              placeholder="Digite o valor"
            />
          </li>
          <li>
            <label class="toggle-container">
              <input
                type="checkbox"
                class="servicos"
                id="checkBarba"
                data-nome="Barba"
              />
              <span class="toggle"></span>
              <span class="nome-servico">Barba</span>
            </label>
            <input
              type="text"
              class="valor"
              id="valorBarba"
              placeholder="Digite o valor"
            />
          </li>
          <li>
            <label class="toggle-container">
              <input
                type="checkbox"
                class="servicos"
                id="checkSobrancelha2"
                data-nome="Sobrancelha2"
              />
              <span class="toggle"></span>
              <span class="nome-servico">Sobrancelha</span>
            </label>
            <input
              type="text"
              class="valor"
              id="valorSobrancelha2"
              placeholder="Digite o valor"
            />
          </li>
          <li>
            <label class="toggle-container">
              <input
                type="checkbox"
                class="servicos"
                id="checkPe"
                data-nome="Pézinho"
              />
              <span class="toggle"></span>
              <span class="nome-servico">Pezinho</span>
            </label>
            <input
              type="text"
              class="valor"
              id="valorPe"
              placeholder="Digite o valor"
            />
          </li>
        </ul>
        <button id="btnConfirma">Confirmar</button>
      </div>
    </main>

    <script src="./JavaScript/config.js"></script>
  </body>
</html>
