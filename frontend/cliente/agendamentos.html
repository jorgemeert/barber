<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CorteJá</title>
    <link rel="stylesheet" href="./css/agendamento.css" />
  </head>
  <body>
    <header>
      <h1>CorteJá</h1>
      <nav>
        <a href="" id="voltar">Início</a>
        <a href="" class="active">Agendamentos</a>
        <a href="">Configurações</a>
      </nav>
    </header>
    <main>
      <h2>Agende seu horário</h2>
      <div class="agendamento-container">
        <div class="campo">
          <label for="data">Dia</label>
          <input type="date" id="data" />
        </div>
        <div class="campo">
          <label for="horario">Horário</label>
          <select id="horario"></select>
        </div>
        <div class="campo">
          <label>Serviço</label>
          <div id="servicos"></div>
        </div>
        <button id="btnAgendar">Agendar</button>
      </div>
    </main>
    <script src="./JavaScript/agendamentos.js"></script>
  </body>
</html>
