<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CorteJá</title>
  </head>
  <body>
    <header>
      <a href="" id="voltar">Voltar</a>
      <h1>CorteJá</h1>
      <p>Vamos começar seu agendamento</p>
    </header>
    <main>
      <div id="servicosBarbeiro"></div>
      <div>
        <div>
          <label for="data">Selecione um dia</label>
          <input type="date" id="data" />
        </div>
        <div>
          <label for="horario">Selecione o horário do seu interesse</label>
          <input type="time" id="horario" />
        </div>
        <div>
          <label for="servico">Qual serviço você tem interesse em fazer?</label>
          <div id="servicos"></div>
        </div>
        <button id="btnAgendar">Agende seu horário</button>
      </div>
    </main>
    <script src="./JavaScript/agendamentos.js"></script>
  </body>
</html>
